<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory & Rune Calculator</title>
    <style>
        :root {
            --bg: #060912;
            --card: #111827;
            --blue: #38bdf8;
            --pink: #f472b6;
            --green: #4ade80;
            --text: #f1f5f9;
            --border: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            margin: 0;
        }

        .container { max-width: 1100px; width: 100%; }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-left { display: flex; gap: 10px; align-items: center; }
        
        .btn-nav {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-nav.active {
            border-color: var(--blue);
            color: var(--blue);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        select, .btn-settings {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        h1 {
            text-align: center;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 1.8rem;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .view-section { display: none; width: 100%; }
        .view-section.active { display: block; }

        .top-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
        }

        .stat-card label {
            display: block;
            font-size: 0.75rem;
            color: var(--blue);
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stat-card input, .rune-input-group input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--green);
            font-size: 1.8rem;
            text-align: center;
            width: 90%;
            border-radius: 8px;
            outline: none;
        }

        .tier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .tier-card, .rune-box {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            border-bottom: 3px solid var(--pink);
        }

        .tier-title, .rune-box h3 {
            display: flex;
            flex-direction: column;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--pink);
            text-transform: uppercase;
        }

        .tier-info { color: #6b7280; font-size: 0.7rem; font-weight: normal; margin-top: 2px; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .field-box label {
            display: block;
            font-size: 0.6rem;
            color: #9ca3af;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .field-box input {
            width: 100%;
            background: #060912;
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px;
            border-radius: 5px;
            text-align: center;
        }

        .tier-time, .rune-res-val {
            margin-top: 10px;
            padding: 8px;
            border-top: 1px dashed #374151;
            font-size: 0.85rem;
            text-align: center;
            color: var(--green);
            font-weight: bold;
        }

        .reset-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 30px 0;
            flex-wrap: wrap;
        }

        .btn-action {
            background: transparent;
            border: 1px solid var(--pink);
            color: var(--pink);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-action:hover { background: var(--pink); color: white; }

        .strategy-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .perc-btn-group { display: flex; gap: 5px; }

        .perc-btn {
            background: #060912;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .perc-btn.active { color: var(--pink); border-color: var(--pink); }

        .strategy-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .strategy-table th { color: var(--blue); text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        .strategy-table td { padding: 10px; border-bottom: 1px solid #1f2937; }

        .summary-box {
            background: linear-gradient(145deg, #111827, #060912);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--green);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .res-val { color: var(--green); font-weight: bold; }
        .done-text { font-size: 1.5rem; color: var(--green); margin-top: 10px; font-weight: bold; }

        .rune-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .rune-input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .rune-input-group input { flex: 2; font-size: 1.2rem; padding: 10px; }
        .rune-input-group select { flex: 1; background: #060912; border: 1px solid var(--border); color: #fff; border-radius: 8px; }

        .modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--blue);
            padding: 25px;
            border-radius: 12px;
            width: 90%; max-width: 500px;
        }

        @media (max-width: 600px) {
            .header-nav { justify-content: center; }
            .top-bar, .rune-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <div class="nav-left">
            <select id="langSelect" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
                <option value="es">Español</option>
                <option value="pl">Polski</option>
                <option value="ru">Русский</option>
                <option value="id">Bahasa Indonesia</option>
                <option value="pt">Português</option>
            </select>
            <button class="btn-nav active" id="nav-factory" onclick="showView('factory')">Factory Calculator</button>
            <button class="btn-nav" id="nav-rune" onclick="showView('rune')">Rune Calculator</button>
        </div>
        <button class="btn-settings" onclick="toggleModal()">⚙️ Settings</button>
    </div>

    <div id="view-factory" class="view-section active">
        <h1>Factory Calculator</h1>
        <div class="top-bar">
            <div class="stat-card">
                <label id="lbl-rate">Points / Sec (Rate)</label>
                <input type="text" id="rate" value="350" oninput="handleInput(this, 'factory')">
            </div>
            <div class="stat-card">
                <label id="lbl-needed">Real Points Needed</label>
                <div id="pts-needed" style="font-size: 2rem; font-weight: bold; color: var(--pink); margin-top: 5px;">0</div>
            </div>
        </div>
        <div class="tier-grid" id="tier-container"></div>
        <div class="reset-container">
            <button class="btn-action" onclick="resetFields('want')" id="btn-reset-want">Reset "Want"</button>
            <button class="btn-action" onclick="resetFields('have')" id="btn-reset-have">Reset "Have"</button>
            <button class="btn-action" onclick="resetFields('both')" id="btn-reset-both">Reset All</button>
        </div>
        <div class="strategy-card">
            <div class="strategy-header">
                <h3 id="lbl-strat-title" style="color: var(--blue); text-transform: uppercase; margin:0;">Bulk Merger Strategy</h3>
                <div class="perc-btn-group">
                    <button class="perc-btn" onclick="setPerc(10)">10%</button>
                    <button class="perc-btn" onclick="setPerc(25)">25%</button>
                    <button class="perc-btn" onclick="setPerc(50)">50%</button>
                </div>
            </div>
            <div style="overflow-x: auto;">
                <table class="strategy-table">
                    <thead>
                        <tr><th id="lbl-th-tier">Target</th><th id="lbl-th-merge">Merge Previous at...</th><th id="lbl-th-result">Est. Gain</th></tr>
                    </thead>
                    <tbody id="strategy-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="view-rune" class="view-section">
        <h1>Rune Calculator</h1>
        <div class="rune-grid">
            <div class="rune-box">
                <h3 id="lbl-rune-stats">1. Current Stats</h3>
                <label id="lbl-rune-luck">Rune Luck Multiplier:</label>
                <div class="rune-input-group">
                    <input type="text" id="runeLuckNum" value="1" oninput="handleInput(this, 'rune')">
                    <select id="runeLuckSuffix" onchange="calculateRune()"></select>
                </div>
                <label id="lbl-rune-bulk">Rune Bulk:</label>
                <div class="rune-input-group">
                    <input type="text" id="runeBulkNum" value="1" oninput="handleInput(this, 'rune')">
                    <select id="runeBulkSuffix" onchange="calculateRune()"></select>
                </div>
                <label id="lbl-rune-speed">Rune Speed (Seconds):</label>
                <input type="text" id="runeSpeed" value="0.05" oninput="handleInput(this, 'rune')" style="width:100%; background:#060912; border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px; text-align:center;">
            </div>
            <div class="rune-box">
                <h3 id="lbl-rune-target">2. Target Settings</h3>
                <label id="lbl-rune-goal">Target Amount / RPS Goal:</label>
                <div class="rune-input-group">
                    <input type="text" id="runeTargetNum" value="10" oninput="handleInput(this, 'rune')">
                    <select id="runeTargetSuffix" onchange="calculateRune()"></select>
                </div>
                <div style="margin-top:20px;">
                    <label id="lbl-raw-rps">Raw Production (RPS):</label>
                    <div id="out-raw-rps" class="rune-res-val">-</div>
                    <label id="lbl-multi-rps">Multiplied Score /s:</label>
                    <div id="out-multi-rps" class="rune-res-val" style="color:var(--blue)">-</div>
                </div>
            </div>
        </div>
        <div class="rune-box" style="margin-bottom:25px; border-bottom:3px solid var(--green);">
            <h3 id="lbl-rune-results" style="color:var(--green)">3. Results & Time</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label id="lbl-req-bulk">Required Bulk for Goal:</label>
                    <div id="out-req-bulk" class="rune-res-val">-</div>
                </div>
                <div>
                    <label id="lbl-time-grind">Time to reach Goal:</label>
                    <div id="out-rune-time" class="rune-res-val" style="color:var(--blue)">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="summary-box">
        <div class="res-column">
            <h3 id="lbl-estimation" style="color: var(--blue); margin: 0 0 15px 0;">Time Estimation</h3>
            <div class="res-row"><span id="lbl-d">Days:</span> <span class="res-val" id="out-d">0</span></div>
            <div class="res-row"><span id="lbl-h">Hours:</span> <span class="res-val" id="out-h">0</span></div>
        </div>
        <div class="res-column" style="text-align: center;">
            <h3 id="lbl-completion" style="color: var(--blue); margin: 0 0 15px 0;">Completion Date</h3>
            <div id="hms-needed" style="font-size: 1.2rem; font-weight: bold;">00:00:00</div>
            <div class="done-text" id="done-by">--/--/-- - --:--</div>
        </div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--blue); margin-top: 0;">Settings</h2>
        <div style="margin-bottom: 20px;">
            <label style="color:var(--blue); display:block; margin-bottom:10px;">Data Export / Import</label>
            <textarea id="io-area" style="width: 100%; height: 80px; background: #000; color: var(--green); border: 1px solid var(--border); font-size: 0.7rem;"></textarea>
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <button class="btn-nav" onclick="exportData()" style="flex:1">Export</button>
                <button class="btn-nav" onclick="importData()" style="flex:1">Import</button>
            </div>
        </div>
        <button onclick="toggleModal()" style="width: 100%; padding: 12px; background: var(--blue); color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer;">Close</button>
    </div>
</div>

        pt: { locale: "pt-PT", rate: "Pontos / Seg (Taxa)", needed: "Pontos Necessários", have: "Possuo", want: "Quero", estimation: "Estimativa de Tempo", d: "Dias:", h: "Horas:", completion: "Date de Conclusão", goal: "Meta Atingida!", no_target: "Sem alvo", time_lbl: "Tempo: ", strat_title: "Estrategia de Fusão", th_tier: "Tier Alvo", th_merge: "Fundir em...", th_result: "Ganho Est.", reset_have: "Reset Possuo", reset_want: "Reset Quero", reset_both: "Reset Tudo", confirm: "Tem certeza?", rune_stats: "1. Estatísticas", rune_luck: "Multiplicador de Sorte:", rune_bulk: "Volume de Runas:", rune_speed: "Velocidade (Segundos):", rune_target: "2. Objetivo", rune_goal: "Quantidade / RPS Alvo:", raw_rps: "Produção Bruta (RPS):", multi_rps: "Pontuação /s:", rune_results: "3. Resultados", req_bulk: "Volume Necessário:", time_grind: "Tempo para la meta:" }
    };

    const runeSuffixes = ["", "K", "M", "B", "T", "Qd", "Qn", "Sx", "Sp", "Oc", "No", "De", "Ude", "Dde", "Tde", "Qdde", "Qnde", "Sxde", "Spde", "Ocde", "Node", "Vgde", "Uvgde", "Dvgde", "Tvgde", "Qavgde", "Qivgde", "Sxvgde", "Spvgde", "Ocvgde", "Novgde", "Tgde", "Utgde", "Dtgde", "Ttgde", "Qatgde", "Qitgde", "Sxtgde", "Sptgde", "Octgde", "Notgde", "Qagde", "Uqagde", "Dqagde", "Tqagde", "Qaqagde", "Qiqagde", "Sxqagde", "Spqagde", "Ocqagde", "Noqagde", "Qgde", "Uqgde", "Dqgde", "Tqgde", "Qaqgde", "Qiqgde", "Sxqgde", "Spqggde", "Ocqgde", "Noqgde", "Sgde", "Usgde", "Dsgde", "Tsgde", "Qasgde", "Qisgde", "Sxsgde", "Spsgde", "Ocsgde", "Nosgde", "Spgde", "Uspgde", "Dspgde", "Tspgde", "Qaspgde", "Qispgde", "Sxspgde", "Spspgde", "Ocspgde", "Nospgde", "Ogde", "Uogde", "Dogde", "Togde", "Qaogde", "Qiogde", "Sxogde", "Spogde", "Ocogde", "Noogde", "Ngde", "Ungde", "Dngde", "Tngde", "Qangde", "Qingde", "Sxngde", "Spngde", "Ocngde", "Nongde", "Cde"];

    const defaultTiers = [
        { id: 1, mult: 1, h: 0, w: 100000, max: "100k", hold: 100000 },
        { id: 2, mult: 5, h: 0, w: 15000, max: "15k", hold: 15000 },
        { id: 3, mult: 25, h: 0, w: 200000, max: "200k", hold: 200000 },
        { id: 4, mult: 125, h: 0, w: 4000, max: "4k", hold: 4000 },
        { id: 5, mult: 625, h: 0, w: 80000, max: "80k", hold: 80000 },
        { id: 6, mult: 3125, h: 0, w: 956, max: "956", hold: 956 },
        { id: 7, mult: 15625, h: 0, w: 10000, max: "10k+", hold: 0 }
    ];

    let currentLang = 'en';
    let currentPerc = 10;
    let activeView = 'factory';

    function formatWithCommas(n) { return Math.floor(n).toLocaleString('en-US'); }
    
    
    function parseRaw(s) {
        if (!s) return 0;
        let cleaned = String(s).replace(/,/g, '');
        return parseFloat(cleaned) || 0;
    }


    function handleInput(el, type) {
        let val = el.value;

        if (type === 'factory') {

            val = val.replace(/[^0-9]/g, '');
        } else {

            val = val.replace(/[^0-9.,]/g, '');
            val = val.replace(',', '.'); 
            
            const parts = val.split('.');
            if (parts.length > 2) val = parts[0] + '.' + parts.slice(1).join('');
        }

        
        el.value = val;


        if(type === 'factory') calculateFactory(); else calculateRune();
    }

    function showView(view) {
        activeView = view;
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${view}`).classList.add('active');
        document.getElementById(`nav-${view}`).classList.add('active');
        if(view === 'factory') calculateFactory(); else calculateRune();
        saveData();
    }

    const container = document.getElementById('tier-container');
    defaultTiers.forEach(t => {
        container.innerHTML += `<div class="tier-card"><div class="tier-title"><span class="tier-name">TIER ${t.id} <small>(Max: ${t.max})</small></span><span class="tier-info">Value: ${formatWithCommas(t.mult)}</span></div><div class="input-group"><div class="field-box"><label class="lbl-have">Have</label><input type="text" class="have-in" id="h-${t.id}" data-tier="${t.id}" data-mult="${t.mult}" oninput="handleInput(this, 'factory')"></div><div class="field-box"><label class="lbl-want">Want</label><input type="text" class="want-in" id="w-${t.id}" data-tier="${t.id}" data-mult="${t.mult}" oninput="handleInput(this, 'factory')"></div></div><div class="tier-time" id="tier-time-${t.id}">Time: 0s</div></div>`;
    });

    function setupRuneDropdowns() {
        const ids = ['runeLuckSuffix', 'runeBulkSuffix', 'runeTargetSuffix'];
        ids.forEach(id => {
            const sel = document.getElementById(id);
            if (!sel) return;
            runeSuffixes.forEach((sfx, i) => {
                let opt = document.createElement('option');
                opt.value = i; opt.textContent = sfx || "Ones";
                sel.appendChild(opt);
            });
        });
    }

    function calculateFactory() {
        const rate = parseRaw(document.getElementById('rate').value);
        const t = translations[currentLang];
        let curPts = 0, tarPts = 0;
        document.querySelectorAll('.have-in').forEach(i => curPts += parseRaw(i.value) * parseFloat(i.dataset.mult));
        document.querySelectorAll('.want-in').forEach(i => tarPts += parseRaw(i.value) * parseFloat(i.dataset.mult));
        const diff = Math.max(0, tarPts - curPts);
        const sec = rate > 0 ? diff / rate : 0;
        document.getElementById('pts-needed').innerText = formatWithCommas(diff);
        document.getElementById('out-d').innerText = (sec / 86400).toLocaleString('en-US', {maximumFractionDigits: 1});
        document.getElementById('out-h').innerText = (sec / 3600).toLocaleString('en-US', {maximumFractionDigits: 1});
        document.getElementById('hms-needed').innerText = formatHMS(sec);
        if (sec > 0) document.getElementById('done-by').innerText = new Date(Date.now() + sec*1000).toLocaleString(t.locale);
        else document.getElementById('done-by').innerText = tarPts > 0 ? t.goal : "--/--/--";
        updateStrategy();
        defaultTiers.forEach(tier => {
            const h = parseRaw(document.getElementById(`h-${tier.id}`).value);
            const w = parseRaw(document.getElementById(`w-${tier.id}`).value);
            const tDiff = Math.max(0, (w - h) * tier.mult);
            const tSec = rate > 0 ? tDiff / rate : 0;
            const span = document.getElementById(`tier-time-${tier.id}`);
            if (tSec <= 0 && w > 0) span.innerText = t.goal;
            else if (w === 0) span.innerText = t.no_target;
            else span.innerText = t.time_lbl + formatHMS(tSec);
        });
        saveData();
    }

    function calculateRune() {
        const luck = parseRaw(document.getElementById('runeLuckNum').value);
        const luckSfx = parseInt(document.getElementById('runeLuckSuffix').value);
        const bulk = parseRaw(document.getElementById('runeBulkNum').value);
        const bulkSfx = parseInt(document.getElementById('runeBulkSuffix').value);
        const speed = parseRaw(document.getElementById('runeSpeed').value);
        const target = parseRaw(document.getElementById('runeTargetNum').value);
        const targetSfx = parseInt(document.getElementById('runeTargetSuffix').value);
        if (bulk <= 0 || speed <= 0) return;
        let rps = bulk / speed;
        document.getElementById('out-raw-rps').textContent = formatRuneNum(rps, bulkSfx) + " /s";
        let luckValue = luck * Math.pow(10, (luckSfx) * 3);
        let multiRps = rps * luckValue;
        document.getElementById('out-multi-rps').textContent = formatRuneNum(multiRps, bulkSfx);
        let targetScale = Math.pow(10, (targetSfx - bulkSfx) * 3);
        let reqBulk = (target * targetScale) * speed;
        document.getElementById('out-req-bulk').textContent = formatRuneNum(reqBulk, bulkSfx);
        let grindSec = (target / rps) * targetScale;
        document.getElementById('out-rune-time').textContent = formatGrindTime(grindSec);
        if (activeView === 'rune') {
            document.getElementById('out-d').innerText = (grindSec / 86400).toLocaleString('en-US', {maximumFractionDigits: 1});
            document.getElementById('out-h').innerText = (grindSec / 3600).toLocaleString('en-US', {maximumFractionDigits: 1});
            document.getElementById('hms-needed').innerText = formatHMS(grindSec);
            if (grindSec > 0) document.getElementById('done-by').innerText = new Date(Date.now() + grindSec*1000).toLocaleString(translations[currentLang].locale);
        }
        saveData();
    }

    function formatRuneNum(val, sfxIdx) {
        if (isNaN(val) || val <= 0 || val === Infinity) return "-";
        while (val >= 1000 && sfxIdx < runeSuffixes.length - 1) { val /= 1000; sfxIdx++; }
        while (val < 1 && sfxIdx > 0) { val *= 1000; sfxIdx--; }
        return val.toFixed(2) + " " + runeSuffixes[sfxIdx];
    }

    function formatGrindTime(s) {
        if (isNaN(s) || s === Infinity || s <= 0) return "-";
        if (s < 60) return s.toFixed(2) + "s";
        if (s < 3600) return (s/60).toFixed(1) + "m";
        if (s < 86400) return (s/3600).toFixed(1) + "h";
        return (s/86400).toFixed(1) + "d";
    }

    function formatHMS(s) {
        if (s <= 0) return "00:00:00";
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = Math.floor(s%60);
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
    }

    function updateStrategy() {
        const body = document.getElementById('strategy-body');
        body.innerHTML = '';
        const p = currentPerc / 100;
        for(let i=0; i < defaultTiers.length - 1; i++) {
            const t = defaultTiers[i], n = defaultTiers[i+1];
            const thr = Math.ceil(t.hold / (1 - p));
            const gain = Math.floor((thr * p) / 5);
            body.innerHTML += `<tr><td>T${n.id}</td><td style="color:var(--pink)">${formatWithCommas(thr)} (T${t.id})</td><td style="color:var(--green)">+${formatWithCommas(gain)}</td></tr>`;
        }
    }

    function setPerc(p) {
        currentPerc = p;
        document.querySelectorAll('.perc-btn').forEach(b => b.classList.toggle('active', parseInt(b.innerText) === p));
        updateStrategy(); saveData();
    }

    function resetFields(type) {
        const t = translations[currentLang];
        if (!confirm(t.confirm)) return;
        if (type === 'have' || type === 'both') document.querySelectorAll('.have-in').forEach(i => i.value = "0");
        if (type === 'want' || type === 'both') document.querySelectorAll('.want-in').forEach(i => i.value = "0");
        calculateFactory();
    }

    function toggleModal() {
        const m = document.getElementById('settingsModal');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    function changeLanguage() {
        currentLang = document.getElementById('langSelect').value;
        const t = translations[currentLang];
        document.getElementById('lbl-rate').innerText = t.rate;
        document.getElementById('lbl-needed').innerText = t.needed;
        document.getElementById('lbl-estimation').innerText = t.estimation;
        document.getElementById('lbl-d').innerText = t.d;
        document.getElementById('lbl-h').innerText = t.h;
        document.getElementById('lbl-completion').innerText = t.completion;
        document.getElementById('lbl-strat-title').innerText = t.strat_title;
        document.getElementById('lbl-th-tier').innerText = t.th_tier;
        document.getElementById('lbl-th-merge').innerText = t.th_merge;
        document.getElementById('lbl-th-result').innerText = t.th_result;
        document.getElementById('btn-reset-have').innerText = t.reset_have;
        document.getElementById('btn-reset-want').innerText = t.reset_want;
        document.getElementById('btn-reset-both').innerText = t.reset_both;
        document.querySelectorAll('.lbl-have').forEach(e => e.innerText = t.have);
        document.querySelectorAll('.lbl-want').forEach(e => e.innerText = t.want);
        document.getElementById('lbl-rune-stats').innerText = t.rune_stats;
        document.getElementById('lbl-rune-luck').innerText = t.rune_luck;
        document.getElementById('lbl-rune-bulk').innerText = t.rune_bulk;
        document.getElementById('lbl-rune-speed').innerText = t.rune_speed;
        document.getElementById('lbl-rune-target').innerText = t.rune_target;
        document.getElementById('lbl-rune-goal').innerText = t.rune_goal;
        document.getElementById('lbl-raw-rps').innerText = t.raw_rps;
        document.getElementById('lbl-multi-rps').innerText = t.multi_rps;
        document.getElementById('lbl-rune-results').innerText = t.rune_results;
        document.getElementById('lbl-req-bulk').innerText = t.req_bulk;
        document.getElementById('lbl-time-grind').innerText = t.time_grind;
        if(activeView === 'factory') calculateFactory(); else calculateRune();
    }

    function exportData() { document.getElementById('io-area').value = btoa(localStorage.getItem('factoryV8')); }
    function importData() { localStorage.setItem('factoryV8', atob(document.getElementById('io-area').value)); location.reload(); }

    function saveData() {
        const data = {
            rate: document.getElementById('rate').value,
            lang: currentLang,
            perc: currentPerc,
            view: activeView,
            rune: {
                luck: document.getElementById('runeLuckNum').value,
                luckSfx: document.getElementById('runeLuckSuffix').value,
                bulk: document.getElementById('runeBulkNum').value,
                bulkSfx: document.getElementById('runeBulkSuffix').value,
                speed: document.getElementById('runeSpeed').value,
                target: document.getElementById('runeTargetNum').value,
                targetSfx: document.getElementById('runeTargetSuffix').value
            },
            factoryTiers: Array.from(document.querySelectorAll('.tier-card')).map(c => ({
                h: c.querySelector('.have-in').value,
                w: c.querySelector('.want-in').value
            }))
        };
        localStorage.setItem('factoryV8', JSON.stringify(data));
    }

    function loadData() {
        setupRuneDropdowns();
        const saved = localStorage.getItem('factoryV8');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('rate').value = data.rate || "350";
            currentLang = data.lang || 'en';
            document.getElementById('langSelect').value = currentLang;
            setPerc(data.perc || 10);
            activeView = data.view || 'factory';
            if(data.rune) {
                document.getElementById('runeLuckNum').value = data.rune.luck;
                document.getElementById('runeLuckSuffix').value = data.rune.luckSfx;
                document.getElementById('runeBulkNum').value = data.rune.bulk;
                document.getElementById('runeBulkSuffix').value = data.rune.bulkSfx;
                document.getElementById('runeSpeed').value = data.rune.speed;
                document.getElementById('runeTargetNum').value = data.rune.target;
                document.getElementById('runeTargetSuffix').value = data.rune.targetSfx;
            }
            if(data.factoryTiers) {
                data.factoryTiers.forEach((t, i) => {
                    if(document.getElementById(`h-${i+1}`)) document.getElementById(`h-${i+1}`).value = t.h;
                    if(document.getElementById(`w-${i+1}`)) document.getElementById(`w-${i+1}`).value = t.w;
                });
            }
        } else { setPerc(10); }
        showView(activeView);
        changeLanguage();
    }
    window.onload = loadData;
</script>
</body>
</html>
